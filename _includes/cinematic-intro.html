        <path pathLength="1" d="M500 30 C500 112 500 166 500 218"></path>
        <path pathLength="1" d="M500 590 C500 504 500 450 500 402"></path>
      </g>
      <g class="cinematic-intro__nodes">
        <circle cx="80" cy="130" r="7"></circle>
        <circle cx="126" cy="482" r="7"></circle>
        <circle cx="260" cy="70" r="6"></circle>
        <circle cx="740" cy="72" r="6"></circle>
        <circle cx="920" cy="150" r="7"></circle>
        <circle cx="876" cy="482" r="7"></circle>
        <circle cx="500" cy="30" r="6"></circle>

    <div class="cinematic-intro__portal">
      <span class="cinematic-intro__orbit cinematic-intro__orbit--outer"></span>
      <span class="cinematic-intro__orbit cinematic-intro__orbit--inner"></span>
      <span class="cinematic-intro__aperture">
        <img src="{{ base_path }}/images/ian-splits.jpeg" alt="" width="421" height="421" decoding="async">
      </span>
    </div>

    <div class="cinematic-intro__identity">
      <p class="cinematic-intro__kicker">Data in motion</p>
      <p class="cinematic-intro__name">Ian Liu</p>

    Skip intro
  </button>

  Replay intro
</button>
