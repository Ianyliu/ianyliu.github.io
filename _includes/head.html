{% include base_path %}

<meta charset="utf-8">

{% include seo.html %}

<link href="{% if site.atom_feed.path %}{{ site.atom_feed.path }}{% else %}{{ base_path }}/feed.xml{% endif %}" type="application/atom+xml" rel="alternate" title="{{ site.title }} Feed">

<!-- http://t.co/dKP3o1e -->
<meta name="HandheldFriendly" content="True">
<meta name="MobileOptimized" content="320">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>
  document.documentElement.className = document.documentElement.className.replace(/\bno-js\b/g, '') + ' js ';
  (function () {
    try {
      var storedTheme = window.localStorage.getItem('theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

      if (storedTheme === 'dark' || (!storedTheme && prefersDark)) {
        document.documentElement.setAttribute('data-theme', 'dark');
      } else if (storedTheme === 'light') {
        document.documentElement.removeAttribute('data-theme');
      }
    } catch (error) {
      /* Keep the server-rendered theme when browser storage is unavailable. */
    }
  }());
  {% if page.url == "/" %}
  (function () {
    var storageKey = 'ian-cinematic-play-count-v3';
    var maximumAutomaticPlays = 9;
    var reduceMotion = window.matchMedia &&
      window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    var introPlayCount = 0;

    try {
      var storedCount = parseInt(window.localStorage.getItem(storageKey), 10);
      introPlayCount = !isNaN(storedCount) && storedCount > 0 ? storedCount : 0;
    } catch (error) {
      /* A self-terminating CSS sequence remains safe when storage is blocked. */
    }

    if (!reduceMotion && introPlayCount < maximumAutomaticPlays) {
      document.documentElement.classList.add('cinematic-intro-pending');

      try {
        window.localStorage.setItem(storageKey, String(introPlayCount + 1));
      } catch (error) {
        /* Continue playing safely when the browser blocks persistent storage. */
      }
    }
  }());
  {% endif %}
</script>

<!-- For all browsers -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/main.css">

<meta http-equiv="cleartype" content="on">
