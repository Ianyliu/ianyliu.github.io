name: Scrape Talk Locations

on:
  workflow_dispatch:
  push:
    paths:
      - '_talks/**'
      - '.github/workflows/scrape_talks.yml'
      - 'talkmap.ipynb'
      - 'talkmap.py'

permissions:
  contents: write

concurrency:
  group: talk-map-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check jupyter pandas requests beautifulsoup4 geopy getorg

      - name: Generate talk map
        run: jupyter nbconvert --to notebook --execute talkmap.ipynb --output talkmap_out.ipynb

      - name: Commit generated map
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- talkmap/map.html talkmap/org-locations.js talkmap_out.ipynb
          if git diff --cached --quiet; then
            echo "No talk-map changes to commit"
          else
            git commit -m "chore: update generated talk map"
            git pull --rebase origin "$GITHUB_REF_NAME"
            git push origin "HEAD:$GITHUB_REF_NAME"
          fi
