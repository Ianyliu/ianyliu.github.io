name: Site checks

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: site-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '18'
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Verify JavaScript bundle
        run: npm test

      - name: Build production site
        env:
          JEKYLL_ENV: production
        run: bundle exec jekyll build --trace

      - name: Check Jekyll configuration
        run: bundle exec jekyll doctor

      - name: Validate generated site
        run: bundle exec ruby scripts/verify_site.rb

      - name: Validate maintenance utilities
        run: |
          python3 -m py_compile talkmap.py scripts/cv_markdown_to_json.py
          bash -n scripts/update_cv_json.sh
